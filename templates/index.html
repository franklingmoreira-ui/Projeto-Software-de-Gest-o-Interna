<!DOCTYPE html>
<html>
<head>
    <title>Painel de Gestão - Franklin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">📋 Tarefas Pendentes - Back-office</h2>
        <table class="table table-striped table-hover shadow-sm bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Setor Destino</th>
                    <th>Descrição</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for tarefa in tarefas %}
                <tr>
                    <td>{{ tarefa.id }}</td>
                    <td><strong>{{ tarefa.titulo }}</strong></td>
                    <td><span class="badge bg-primary">{{ tarefa.setor_destino }}</span></td>
                    <td>{{ tarefa.descricao }}</td>
                    <td><span class="badge bg-warning text-dark">{{ tarefa.status }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
